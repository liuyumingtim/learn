<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ 日常文句練習本 - 數位精華版</title>
    <!-- 引入 Tailwind CSS (快速排版) 與 PapaParse (解析 CSV) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        /* 表格滾動條美化 */
        .table-container { max-height: calc(100vh - 350px); overflow-y: auto; overflow-x: auto; }
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 固定表頭 */
        th { position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.1); }
        
        /* 自定義高亮顏色 */
        .bg-err { background-color: #fef2f2; } /* 淺紅 */
        .text-err { color: #b91c1c; }
        .bg-corr { background-color: #f0fdf4; } /* 淺綠 */
        .text-corr { color: #15803d; }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-3"><i class="fas fa-book-open text-indigo-600 mr-3"></i>日常文句練習本</h1>
            <p class="text-slate-500">將你的 CSV 檔案拖曳至下方，立即轉換為可搜尋的數位筆記本</p>
        </div>

        <!-- 檔案上傳區 -->
        <div id="drop-zone" class="mb-8 border-2 border-dashed border-indigo-300 rounded-2xl p-8 text-center bg-white hover:bg-indigo-50/50 transition-colors cursor-pointer shadow-sm relative overflow-hidden group">
            <input type="file" id="file-input" multiple accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
            <div class="relative z-10 flex flex-col items-center justify-center">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-700">點擊或拖曳 CSV 檔案至此</h3>
                <p class="text-slate-500 mt-2 text-sm">支援上傳：📝 文句建議、🔍 重點解析、📖 實用詞彙 (可一次全選)</p>
                
                <!-- 上傳狀態指示器 -->
                <div class="flex gap-4 mt-6 text-sm font-medium">
                    <span id="status-s1" class="px-3 py-1 rounded-full bg-slate-100 text-slate-400"><i class="fas fa-check-circle mr-1 hidden"></i>文句建議</span>
                    <span id="status-s2" class="px-3 py-1 rounded-full bg-slate-100 text-slate-400"><i class="fas fa-check-circle mr-1 hidden"></i>重點解析</span>
                    <span id="status-s3" class="px-3 py-1 rounded-full bg-slate-100 text-slate-400"><i class="fas fa-check-circle mr-1 hidden"></i>實用詞彙</span>
                </div>
            </div>
        </div>

        <!-- 新增：資料庫狀態與操作區 -->
        <div id="storage-info" class="mb-6 flex justify-between items-center text-sm text-slate-500 hidden px-4">
            <p><i class="fas fa-database mr-2"></i>本機資料庫已載入 <span id="last-update-time" class="text-indigo-600 font-medium ml-1"></span></p>
            <button onclick="clearStorage()" class="text-red-500 hover:text-red-700 transition-colors bg-red-50 px-3 py-1 rounded-lg"><i class="fas fa-trash-alt mr-1"></i>清除快取資料</button>
        </div>

        <!-- 主要內容區 (初始隱藏，直到有資料) -->
        <div id="app-content" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hidden">
            
            <!-- 控制列 (搜尋與頁籤) -->
            <div class="p-4 border-b border-slate-200 bg-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                
                <!-- 頁籤 -->
                <div class="flex space-x-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0" id="tabs">
                    <button onclick="switchTab('s1')" id="tab-s1" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg font-medium whitespace-nowrap transition-colors shadow-sm">📝 第一區：文句建議</button>
                    <button onclick="switchTab('s2')" id="tab-s2" class="px-5 py-2.5 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 rounded-lg font-medium whitespace-nowrap transition-colors">🔍 第二區：重點解析</button>
                    <button onclick="switchTab('s3')" id="tab-s3" class="px-5 py-2.5 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 rounded-lg font-medium whitespace-nowrap transition-colors">📖 第三區：實用詞彙</button>
                </div>

                <!-- 搜尋列 -->
                <div class="relative w-full md:w-72 flex-shrink-0">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-input" placeholder="搜尋關鍵字、句子、單字..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow">
                </div>
            </div>

            <!-- 表格容器 -->
            <div class="table-container p-0">
                <table class="w-full text-left border-collapse" id="data-table">
                    <thead id="table-head" class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                        <!-- 動態生成表頭 -->
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-200 text-sm md:text-base">
                        <!-- 動態生成內容 -->
                    </tbody>
                </table>
                <!-- 空狀態顯示 -->
                <div id="empty-state" class="hidden p-12 text-center text-slate-500">
                    <i class="fas fa-search text-3xl mb-3 text-slate-300"></i>
                    <p>找不到符合條件的結果</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存放三區的解析資料
        const appData = {
            s1: { headers: [], rows: [] },
            s2: { headers: [], rows: [] },
            s3: { headers: [], rows: [] }
        };

        let currentTab = 's1';

        // 處理檔案上傳
        document.getElementById('file-input').addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });

        // 拖曳視覺回饋
        const dropZone = document.getElementById('drop-zone');
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            dropZone.addEventListener(eventName, () => dropZone.classList.add('border-indigo-500', 'bg-indigo-50'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-indigo-500', 'bg-indigo-50'), false);
        });
        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files), false);

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if(file.name.endsWith('.csv')) {
                    Papa.parse(file, {
                        complete: function(results) { processCSV(results.data, file.name); }
                    });
                }
            });
        }

        // 解析 CSV 並分類
        function processCSV(data, filename) {
            // 尋找表頭所在的行數 (透過尋找 '#')
            let headerIdx = -1;
            for (let i = 0; i < Math.min(15, data.length); i++) {
                if (data[i] && data[i][0] && data[i][0].toString().trim() === '#') {
                    headerIdx = i; break;
                }
            }

            if (headerIdx === -1) return;

            const headers = data[headerIdx].map(h => h.trim()).filter(h => h !== '');
            // 過濾掉全空的列
            const rows = data.slice(headerIdx + 1).filter(row => row.some(cell => cell && cell.trim() !== ''));

            let type = '';
            // 根據特徵欄位判斷是哪一份檔案
            if (headers.includes('✅ 修正建議句')) type = 's1';
            else if (headers.includes('錯誤原因')) type = 's2';
            else if (headers.includes('中文意思')) type = 's3';

            if (type) {
                appData[type] = { headers, rows };
                updateUploadStatus(type);
                document.getElementById('app-content').classList.remove('hidden');
                
                // 新增：將更新後的資料存入瀏覽器快取
                saveToStorage();
                
                // 如果這是第一個上傳的檔案，自動切換到該分頁
                if (document.querySelectorAll('.bg-emerald-100').length === 1) {
                    switchTab(type);
                } else if (currentTab === type) {
                    renderTable(type); // 重新渲染當前分頁
                }
            }
        }

        // 更新上傳狀態 UI
        function updateUploadStatus(type) {
            const badge = document.getElementById(`status-${type}`);
            badge.classList.remove('bg-slate-100', 'text-slate-400');
            badge.classList.add('bg-emerald-100', 'text-emerald-700', 'font-bold');
            badge.querySelector('i').classList.remove('hidden');
        }

        // 切換頁籤
        function switchTab(type) {
            if (!appData[type].headers.length) {
                alert('請先上傳包含此區內容的 CSV 檔案喔！');
                return;
            }
            currentTab = type;
            
            // 更新按鈕樣式
            ['s1', 's2', 's3'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === type) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                    btn.classList.remove('bg-white', 'text-slate-600', 'hover:bg-slate-100', 'border');
                } else {
                    btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                    btn.classList.add('bg-white', 'text-slate-600', 'hover:bg-slate-100', 'border');
                }
            });

            renderTable(type);
            
            // 重新執行搜尋過濾
            filterTable(document.getElementById('search-input').value);
        }

        // 渲染表格內容與特殊樣式
        function renderTable(type) {
            const data = appData[type];
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            
            // 渲染表頭
            let headHTML = '<tr>';
            data.headers.forEach(h => {
                headHTML += `<th class="px-4 py-4 font-bold border-b border-slate-200">${h}</th>`;
            });
            headHTML += '</tr>';
            thead.innerHTML = headHTML;

            // 渲染內容
            let bodyHTML = '';
            data.rows.forEach(row => {
                bodyHTML += '<tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 group">';
                
                data.headers.forEach((h, idx) => {
                    let cellData = row[idx] ? row[idx].trim().replace(/\n/g, '<br>') : '';
                    let classes = 'px-4 py-3 align-top ';
                    let innerHTML = cellData;

                    // 針對不同欄位套用自定義排版
                    if (type === 's1') {
                        if (h === '原句（待修正）') { classes += 'bg-err text-err italic border-l-4 border-red-300'; }
                        if (h === '✅ 修正建議句') { classes += 'bg-corr text-corr font-bold border-l-4 border-emerald-300'; }
                        if (h === '語氣' || h === '難度') {
                            innerHTML = cellData ? `<span class="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-semibold tracking-wide">${cellData}</span>` : '';
                        }
                        if (h === '#') { classes += 'text-slate-400 font-bold text-center w-12 bg-slate-50'; }
                    } 
                    else if (type === 's2') {
                        if (h === '關鍵詞 / 文法點') { classes += 'font-bold text-amber-700'; }
                        if (h === '正確用法') { classes += 'text-emerald-700 font-medium'; }
                        if (h === '錯誤原因') { classes += 'text-slate-500'; innerHTML = `<i class="fas fa-times text-red-400 mr-1 text-xs"></i> ${cellData}`; }
                        if (h === '類型') {
                            innerHTML = cellData ? `<span class="inline-block px-3 py-1 bg-sky-50 text-sky-700 rounded-full text-xs font-semibold">${cellData}</span>` : '';
                        }
                        if (h === '#') { classes += 'text-slate-400 font-bold text-center w-12 bg-slate-50'; }
                    }
                    else if (type === 's3') {
                        if (h === '詞彙 / 片語') { classes += 'font-bold text-indigo-700 text-base'; }
                        if (h === '詞性') { classes += 'text-slate-400 italic text-sm'; }
                        if (h === '延伸搭配詞') { classes += 'text-slate-500 border-l-2 border-slate-200 pl-3 bg-slate-50/50'; }
                        if (h === '主題') {
                            innerHTML = cellData ? `<span class="inline-block px-3 py-1 bg-purple-50 text-purple-700 rounded-full text-xs font-semibold">${cellData}</span>` : '';
                        }
                        if (h === '#') { classes += 'text-slate-400 font-bold text-center w-12 bg-slate-50'; }
                    }

                    bodyHTML += `<td class="${classes}">${innerHTML}</td>`;
                });
                bodyHTML += '</tr>';
            });
            tbody.innerHTML = bodyHTML;
        }

        // 搜尋過濾功能
        document.getElementById('search-input').addEventListener('input', function(e) {
            filterTable(e.target.value);
        });

        function filterTable(query) {
            const q = query.toLowerCase();
            const rows = document.querySelectorAll('#table-body tr');
            let visibleCount = 0;

            rows.forEach(tr => {
                const text = tr.innerText.toLowerCase();
                if (text.includes(q)) {
                    tr.style.display = '';
                    visibleCount++;
                } else {
                    tr.style.display = 'none';
                }
            });

            const emptyState = document.getElementById('empty-state');
            if (visibleCount === 0 && rows.length > 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }
        }

        // ================= 新增：LocalStorage 快取功能 =================

        // 儲存資料到瀏覽器
        function saveToStorage() {
            localStorage.setItem('englishAppData', JSON.stringify(appData));
            const now = new Date().toLocaleString('zh-TW');
            localStorage.setItem('englishAppUpdateTime', now);
            showStorageInfo(now);
        }

        // 顯示資料庫更新時間
        function showStorageInfo(time) {
            const infoDiv = document.getElementById('storage-info');
            const timeSpan = document.getElementById('last-update-time');
            if (infoDiv && timeSpan) {
                infoDiv.classList.remove('hidden');
                timeSpan.innerText = '(最後更新：' + time + ')';
            }
        }

        // 清除本機資料
        function clearStorage() {
            if(confirm('確定要清除瀏覽器中的英文筆記資料嗎？\\n(這只會清除網頁紀錄，不會刪除你電腦裡的 CSV 檔案)')) {
                localStorage.removeItem('englishAppData');
                localStorage.removeItem('englishAppUpdateTime');
                location.reload(); // 重新載入網頁以重置狀態
            }
        }

        // 網頁載入時自動讀取舊資料
        window.addEventListener('DOMContentLoaded', () => {
            const savedData = localStorage.getItem('englishAppData');
            const savedTime = localStorage.getItem('englishAppUpdateTime');
            
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    Object.assign(appData, parsed);
                    
                    let hasData = false;
                    // 恢復按鈕亮起狀態
                    ['s1', 's2', 's3'].forEach(type => {
                        if (appData[type] && appData[type].headers.length > 0) {
                            updateUploadStatus(type);
                            hasData = true;
                        }
                    });

                    if (hasData) {
                        document.getElementById('app-content').classList.remove('hidden');
                        if (savedTime) showStorageInfo(savedTime);
                        
                        // 自動切換到有資料的第一個頁籤
                        const firstAvailable = ['s1', 's2', 's3'].find(t => appData[t].headers.length > 0);
                        if (firstAvailable) switchTab(firstAvailable);
                    }
                } catch (e) {
                    console.error("讀取本機資料失敗", e);
                }
            }
        });
    </script>
</body>
</html>
